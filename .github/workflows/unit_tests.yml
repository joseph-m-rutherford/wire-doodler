name: Python Unit Tests

on:
  pull_request:

jobs:
  test:
    name: Python Unit Tests
    runs-on: ubuntu-latest
    env:
      JULIA_VERSION: '1.12'
      PYTHON_VERSION: '3.14'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Setup Julia
        uses: julia-actions/setup-julia@v1
        with:
          version: ${{ env.JULIA_VERSION }}

      - name: Cache Julia packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.julia/artifacts
            ~/.julia/compiled
            ~/.julia/packages
            ~/.julia/registries
          key: ${{ runner.os }}-julia-${{ env.JULIA_VERSION }}-pkgs-${{ hashFiles('doodler/quadrature/Project.toml') }}
          restore-keys: |
            ${{ runner.os }}-julia-${{ env.JULIA_VERSION }}pkgs-

      - name: Install Julia packages
        working-directory: doodler/quadrature
        run: |
          julia --project=. -e 'using Pkg; Pkg.instantiate(); Pkg.precompile()'

      - name: Generate Quadrature Rules
        working-directory: doodler/quadrature
        run: |
          julia --project=. generate_quadrature_rules.jl

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-python-${{ env.PYTHON_VERSION }}-pip-${{ hashFiles('requirements-python.txt') }}
          restore-keys: |
            ${{ runner.os }}-python-${{ env.PYTHON_VERSION }}-pip-

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-python.txt

      - name: Run Python Unit Tests
        run: |
          python -m pytest -q
