name: Pytest CI

on:
  pull_request:

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.14'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-py-3.14-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-py-3.14

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Setup Julia
        uses: julia-actions/setup-julia@v1
        with:
          version: '1.12'

      - name: Generate quadrature rules
        working-directory: doodler/quadrature
        run: |
          julia generate_quadrature_rules.jl

      - name: Run tests
        run: |
          python -m pytest -q
